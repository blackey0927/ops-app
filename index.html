    .ops-select {

    .ops-selected-badge { margin-top: 6px; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-family: monospace; line-height: 1.5; }

    function simulateAIGenerate(category) {
      if (!AI_GEN[category]) return null;
      const iPre = Math.floor(Math.random() * AI_GEN[category].pre.zh.length);
      const iCore = Math.floor(Math.random() * AI_GEN[category].core.zh.length);
      const iSuf = Math.floor(Math.random() * AI_GEN[category].suf.zh.length);
      return { 
        id: `ai_${category}_${Date.now()}_${Math.floor(Math.random()*10000)}`, 
        label: `✦ AI: ${AI_GEN[category].core.zh[iCore].substring(0,6)}...`, 
        zh: `${AI_GEN[category].pre.zh[iPre]}${AI_GEN[category].core.zh[iCore]}${AI_GEN[category].suf.zh[iSuf]}`, 
        en: `${AI_GEN[category].pre.en[iPre]} ${AI_GEN[category].core.en[iCore]}${AI_GEN[category].suf.en[iSuf]}` 
      };
    }

    function simulateAIExpand(basePrompt, lang) {
      const pick = arr => (arr && arr.length > 0) ? arr[Math.floor(Math.random() * arr.length)] : null;
      if (!basePrompt) return "";
      const extras_zh = ["呈現極致的電影級光影敘事", "充滿戲劇性的視覺張力", "微距級別的真實皮膚紋理細節", "極度細膩的光線折射與次表面散射"];
      const extras_en = ["ultimate cinematic lighting narrative", "dramatic visual tension", "macro-level realistic skin texture details", "extremely delicate light refraction and subsurface scattering"];
      const words = lang === "zh" ? extras_zh : extras_en; const sep = lang === "zh" ? "，" : ", ";
      let added = [];
      for(let i=0; i<3; i++) {
        let w = pick(words);
        if(!basePrompt.includes(w) && !added.includes(w)) added.push(w);
        if(added.length >= 2) break;
      }
      return added.length === 0 ? basePrompt : basePrompt + sep + added.join(sep);
    }

    function Btn({children, onClick, disabled, style={}, color}) {
      return <button onClick={onClick} disabled={disabled} style={{background:`${color}18`,border:`1px solid ${color}`,color:color,padding:"5px 12px",borderRadius:7,fontSize:12,cursor:disabled?"not-allowed":"pointer",fontWeight:700,opacity:disabled?0.5:1,transition:"all 0.2s",...style}}>{children}</button>;
    }
    
    function SelBtn({item, selected, onSelect, color}) {
      const sel = selected === item.id;
      return <button onClick={()=>onSelect(item.id)} title={item.en||""} style={{background:sel?`${color}22`:"var(--card)", border:`1px solid ${sel?color:"var(--border)"}`, color:sel?color:"var(--text)", padding:"4px 9px", borderRadius:13, fontSize:11, cursor:"pointer", fontWeight:sel?700:400}}>{sel?"✓ ":""}{item.label}</button>;
    }
    
    function DropSelect({ items, value, onChange, accent, placeholder = "── 請選擇 ──" }) {
      const selected = items.find(i => i.id === value);
      const borderColor = value ? accent : "var(--border)";
      return (
        <div className="ops-select-wrap">
          <select className="ops-select" value={value} onChange={e => onChange(e.target.value || null)} style={{ border: `1px solid ${borderColor}`, color: value ? accent : "var(--text)" }}>

            {items.map(item => <option key={item.id} value={item.id}>{item.label}</option>)}

          {selected && <div className="ops-selected-badge" style={{ background: `${accent}0f`, border: `1px solid ${accent}25`, color: `${accent}bb` }}>{selected.zh || selected.en || selected.label}</div>}
        </div>
      );
    }
    
    function PromptCard({title, titleColor, content, onExpand, expanding, onComfySend, isComfyGenerating, C}) {
      const [tab, setTab] = useState("en"); 
      const [copied, setCopied] = useState(false);
      const txt = tab === "zh" ? (content ? content.zh : "") : (content ? content.en : "");
      
      const handleCopy = () => {
        const doCopy = () => { setCopied(true); setTimeout(() => setCopied(false), 2000); };
        if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(txt).then(doCopy);
        else { const textArea = document.createElement("textarea"); textArea.value = txt; document.body.appendChild(textArea); textArea.select(); try { document.execCommand('copy'); doCopy(); } catch (err) {} document.body.removeChild(textArea); }
      };

      return <div style={{background:"var(--promptBg)",border:`1px solid ${titleColor}30`,borderRadius:10,overflow:"hidden",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderBottom:`1px solid ${titleColor}20`, flexWrap:"wrap", gap:6}}>
          <span style={{color:titleColor,fontWeight:700,fontSize:12}}>{title}</span>
          <div style={{display:"flex",gap:5}}>

            {onExpand&&<Btn onClick={()=>onExpand(tab)} disabled={expanding} color={C.cyan} style={{padding:"2px 8px",fontSize:11}}>{expanding?"⟳ 擴寫中...":"✦ AI智能擴寫"}</Btn>}
            {onComfySend && (
                <Btn onClick={() => onComfySend(txt, tab)} disabled={isComfyGenerating} color={C.green} style={{padding:"2px 8px",fontSize:11, background: `${C.green}26`}}>
                    {isComfyGenerating ? "⏳ 算圖中..." : `🚀 送至 ComfyUI (${tab.toUpperCase()})`}
                </Btn>
            )}
            <Btn onClick={handleCopy} color={copied ? C.green : titleColor} style={{padding:"2px 8px",fontSize:11}}>{copied ? "✓ 已複製" : "⎘ 複製"}</Btn>
          </div>
        </div>
        <div style={{padding:"10px 12px",fontSize:13,fontFamily:"monospace",lineHeight:1.7,color:"var(--text)",maxHeight:160,overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{txt}</div>
      </div>;
    }
    
    function CopyAll({prompts, selChars, mergedChars, title, C}) {
      const [copied,setCopied]=useState("");
      const copy = lang => { 
        const z = lang === "zh";
        let parts = [`=== ${title} ===`, `\n[${z?"正向":"Positive"}]\n${z ? prompts.pos.zh : prompts.pos.en}`, `\n[${z?"負向":"Negative"}]\n${z ? prompts.neg.zh : prompts.neg.en}`];
        selChars.forEach(charId => { const p = prompts[charId]; if (p && (z ? p.zh : p.en)) { parts.push(`\n[${mergedChars[charId]?.name || charId}]\n${z ? p.zh : p.en}`); } });
        const txt = parts.filter(Boolean).join("\n");
        const doCopy = () => { setCopied(lang); setTimeout(()=>setCopied(""),2500); };
        if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(txt).then(doCopy);
        else { const textArea = document.createElement("textarea"); textArea.value = txt; document.body.appendChild(textArea); textArea.select(); try { document.execCommand('copy'); doCopy(); } catch (err) {} document.body.removeChild(textArea); }
      };
      return <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
        <Btn onClick={()=>copy("zh")} color={copied==="zh"?C.green:C.pink}>{copied==="zh"?"✓ 已複製全部中文":"⎘ 複製全部中文"}</Btn>
        <Btn onClick={()=>copy("en")} color={copied==="en"?C.green:C.cyan}>{copied==="en"?"✓ Copied All EN":"⎘ 複製全部英文"}</Btn>
      </div>;
    }

        {children}

            </div>

            <div style={{background:`${C.orange}0A`,border:`1px solid ${C.orange}26`,borderRadius:10,padding:"15px",marginBottom:12}}>
              <div style={{fontSize:11,color:C.orange,letterSpacing:2,fontWeight:700,marginBottom:10}}>🎬 ⑪ 導演指令 DIRECTOR SETTINGS <span style={{fontSize:9, color:"var(--subtext)", fontWeight:"normal"}}>(按一下選取，再按一下取消)</span></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div style={{gridColumn:"1/-1"}}>
                  <div style={{fontSize:11,color:"var(--subtext)",marginBottom:5}}>① 人物細節參考設定</div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    <div><div style={{fontSize:10,color:"var(--subtext)",marginBottom:3}}>前綴</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{DIRECTION_DB.ref_prefix.map(item=><SelBtn key={item.id} item={item} selected={selRefPrefix} onSelect={id=>setSelRefPrefix(p=>p===id?null:id)} color={C.orange}/>)}</div></div>
                    <div><div style={{fontSize:10,color:"var(--subtext)",marginBottom:3}}>動作</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{DIRECTION_DB.ref_core.map(item=><SelBtn key={item.id} item={item} selected={selRefCore} onSelect={id=>setSelRefCore(p=>p===id?null:id)} color={C.orange}/>)}</div></div>
                    <div><div style={{fontSize:10,color:"var(--subtext)",marginBottom:3}}>後綴</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{DIRECTION_DB.ref_suffix.map(item=><SelBtn key={item.id} item={item} selected={selRefSuffix} onSelect={id=>setSelRefSuffix(p=>p===id?null:id)} color={C.orange}/>)}</div></div>
                  </div>
                </div>
                <div>
                  <div style={{fontSize:11,color:"var(--subtext)",marginBottom:5}}>② 畫面格式 & 人物佔比</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>{DIRECTION_DB.ratio.map(item=><SelBtn key={item.id} item={item} selected={selRatio} onSelect={id=>setSelRatio(p=>p===id?null:id)} color={C.cyan}/>)}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{DIRECTION_DB.person_size.map(item=><SelBtn key={item.id} item={item} selected={selPersonSize} onSelect={id=>setSelPersonSize(p=>p===id?null:id)} color={C.cyan}/>)}</div>
                </div>
                <div style={{gridColumn:"1/-1"}}>
                  <div style={{fontSize:11,color:"var(--subtext)",marginBottom:8}}>③ 構圖 &amp; 攝影技法</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
                    {allCompRule.map(item=><SelBtn key={item.id} item={item} selected={selCompRule} onSelect={id=>setSelCompRule(p=>p===id?null:id)} color={C.purple}/>)}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{DIRECTION_DB.comp_bg.map(item=><SelBtn key={item.id} item={item} selected={selCompBg} onSelect={id=>setSelCompBg(p=>p===id?null:id)} color={C.purple}/>)}</div>
                </div>
              </div>
            </div>

            <button onClick={gen} disabled={loading} style={{width:"100%",padding:16,background:loading?"var(--border)":isCloudMode?`linear-gradient(135deg,${C.cloud},${C.cyan})`:`linear-gradient(135deg,${C.cyan},${C.purple})`,border:"none",borderRadius:10,color:"#fff",fontSize:16,fontWeight:800,letterSpacing:3,cursor:loading?"not-allowed":"pointer",marginBottom:12}}>
              {loading?"⟳ 生成中...":isCloudMode?"◈ 產生雲端安全咒語 (隱性浮雕破防機制)":"◈ 產生本地硬核咒語 (注入 1.5 標籤破壁)"}
            </button>

            {result&&<div>
              <div style={{fontSize:11, color:isCloudMode?C.cloud:C.green, marginBottom:8, letterSpacing:1}}>
                {isCloudMode ? "☁️ 已啟用雲端破防模式：自動掛載隱性浮雕微陰影咒語" : "✔ 已自動植入: sks_salon, sks_je, IPD 1:1, 滿血物理張力詞"}
              </div>
              <PromptCard 
                title="＋ 正向提示詞 POSITIVE" 
                titleColor={isCloudMode?C.cloud:C.green} 
                content={prompts.pos} 
                onExpand={lang=>handleExpand("pos",lang)} 
                expanding={expandingState.pos_zh||expandingState.pos_en} 
                onComfySend={!isCloudMode ? (txt, lang) => handleComfySend(txt, prompts.neg[lang]) : null} 
                isComfyGenerating={isComfyGenerating}
                C={C}
              />
              <PromptCard title="－ 負向提示詞 NEGATIVE" titleColor={C.red} content={prompts.neg} C={C}/>
              {selChars.map(charId => {
                  const p = prompts[charId]; const ch = mergedChars[charId];
                  if (!p || (!p.zh && !p.en)) return null;
                  return <PromptCard 
                    key={charId} 
                    title={`◆ ${ch.name}`} 
                    titleColor={ch.color} 
                    content={p} 
                    onExpand={lang=>handleExpand(charId,lang)} 
                    expanding={expandingState[`${charId}_zh`]||expandingState[`${charId}_en`]} 
                    onComfySend={!isCloudMode ? (txt, lang) => handleComfySend(txt, prompts.neg[lang]) : null} 
                    isComfyGenerating={isComfyGenerating}
                    C={C}
                  />;
              })}
              <CopyAll prompts={prompts} selChars={selChars} mergedChars={mergedChars} title={`${result.title_zh} / ${result.title_en}`} C={C}/>
            </div>}

            {/* 🎨 ComfyUI 算圖結果動態顯示區域 (已移除跨域按鈕，回歸原生右鍵) */}
            {(!isCloudMode && (isComfyGenerating || comfyImages.length > 0)) && (
              <div ref={comfyGalleryRef} style={{marginTop:24, padding:20, background:"var(--card)", border:`1px solid ${C.green}`, borderRadius:12, boxShadow:`0 10px 30px ${C.green}1A`}}>
                <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:16}}>
                   <span style={{fontSize:20}}>🎨</span>
                   <span style={{color:C.green, fontWeight:800, fontSize:15, letterSpacing:1}}>ComfyUI 即時算圖引擎</span>
                </div>
                
                {isComfyGenerating && (
                  <div style={{marginBottom: 10}}>
                    <div style={{display:"flex", justifyContent:"space-between", fontSize:12, color:"var(--subtext)", marginBottom:8, fontWeight:"bold"}}>
                      <span style={{color: C.green}}>⚡ 正在與 RTX 5090 伺服器通訊，渲染處理中...</span>
                      <span>{comfyProgress}%</span>
                    </div>
                    <div style={{width:"100%", height:8, background:`${C.green}1A`, borderRadius:4, overflow:"hidden", border:`1px solid ${C.green}4D`}}>
                      <div style={{width:`${comfyProgress}%`, height:"100%", background:C.green, transition:"width 0.3s ease-out", boxShadow:`0 0 10px ${C.green}CC`}}></div>
                    </div>
                  </div>
                )}

                {comfyImages.length > 0 && (
                  <div style={{display:"flex", gap:12, overflowX:"auto", paddingBottom:10}}>
                    {comfyImages.map((src, idx) => (
                      <div key={idx} className="comfy-image" style={{position:"relative", flexShrink:0}}>
                         <img src={src} style={{height: 450, borderRadius:8, border:`2px solid var(--border)`, objectFit:"contain", background:"#000", boxShadow:"0 5px 15px rgba(0,0,0,0.5)", display:"block"}} alt={`ComfyUI Generated ${idx}`} />
                         
                         <div style={{position:"absolute", top:10, right:10, background:"rgba(0,0,0,0.7)", padding:"4px 8px", borderRadius:4, color:C.green, fontSize:10, fontWeight:"bold", border:`1px solid ${C.green}`}}>
                           ✓ 渲染完成
                         </div>
                         
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      </>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
<script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker 註冊成功！', reg.scope))
          .catch(err => console.log('Service Worker 註冊失敗：', err));
      });
    }
  </script>
</body>
</html>
